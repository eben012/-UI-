<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다크패턴 UI 경험 - 배달 결제 프로세스</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #87CEEB 0%, #87CEEB 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    max-width: 800px;
    width: 100%;
    padding: 40px;
}
.step-indicator {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
}
.step-indicator h1 {
    font-size: 28px;
    margin-bottom: 10px;
}
.step-number {
    color: #666;
    font-weight: normal;
    font-size: 14px;
}
/* ===== 네비게이션 ===== */
.navigation {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 25px;
}
.nav-button {
    background: #E8E8E8;
    color: #666;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    flex: 1;
}
.nav-button:hover:not(:disabled) {
    background: #D8D8D8;
    color: #333;
}
.nav-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.nav-button.prev {
    flex: 0.5;
}
.nav-button.next {
    flex: 0.5;
}
/* ===== 시작 대기 화면 ===== */
.stage-waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    min-height: 400px;
}
.stage-waiting h2 {
    font-size: 32px;
    color: #333;
}
.stage-waiting p {
    font-size: 18px;
    color: #666;
}
.waiting-info {
    background: #f0f8ff;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: #555;
    font-size: 16px;
    max-width: 400px;
}
.start-button {
    background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
    color: white;
    border: none;
    padding: 18px 50px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
}
.start-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
}
/* ===== 공통 스타일 ===== */
.page {
    display: none;
}
.page.active {
    display: block;
}
.header-status-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff3cd;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
    border: 2px solid #ffc107;
}
.money-display {
    font-size: 20px;
    font-weight: bold;
    color: #2c3e50;
}
.timer-section-box {
    text-align: right;
}
.timer {
    font-size: 32px;
    font-weight: bold;
    color: #FF6B6B;
    font-family: 'Courier New', monospace;
}
.timer-label {
    font-size: 12px;
    color: #666;
    margin-top: 2px;
}
/* ===== 1단계 스타일 ===== */
.stage-1 {
    display: none;
}
.stage-1.active {
    display: block;
}
.cart-items {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}
.cart-item {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #e0e0e0;
}
.cart-item:last-child {
    border-bottom: none;
}
.item-name {
    font-weight: 500;
    color: #333;
}
.item-price {
    color: #666;
    font-weight: 600;
}
.membership-section {
    background: #fff3cd;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    border: 2px solid #ffc107;
}
.checkbox-wrapper {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    cursor: pointer;
}
.checkbox-wrapper input[type="checkbox"] {
    width: 20px;
    height: 20px;
    margin-right: 12px;
    cursor: pointer;
    accent-color: #FF6B6B;
}
.membership-text {
    font-weight: 600;
    color: #333;
}
.membership-price {
    color: #FF6B6B;
    font-weight: bold;
    font-size: 16px;
}
.discount-note {
    font-size: 13px;
    color: #FF6B6B;
    margin-top: 8px;
    font-weight: 500;
}
.price-summary {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 25px;
}
.price-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    color: #333;
}
.price-row.total {
    font-weight: bold;
    font-size: 18px;
    border-top: 2px solid #ddd;
    padding-top: 12px;
    margin-top: 12px;
}
.hidden-price {
    font-size: 11px;
    color: #999;
    margin-top: 5px;
    font-weight: 300;
}
/* ===== 약관 드롭다운 ===== */
.terms-section {
    margin-bottom: 20px;
    display: none;
}
.terms-section.show {
    display: block;
}

    background: #f0f8ff;
    border: 2px solid #87CEEB;
    border-radius: 8px;
    max-height: 300px
