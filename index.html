<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다크패턴 UI 경험 - 배달 결제 프로세스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #87CEEB 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        .step-indicator {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .step-indicator h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .step-number {
            color: #666;
            font-weight: normal;
            font-size: 14px;
        }

        /* ===== 네비게이션 ===== */
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 25px;
        }

        .nav-button {
            background: #E8E8E8;
            color: #666;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            flex: 1;
        }

        .nav-button:hover:not(:disabled) {
            background: #D8D8D8;
            color: #333;
        }

        .nav-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .nav-button.prev {
            flex: 0.5;
        }

        .nav-button.next {
            flex: 0.5;
        }

        /* ===== 시작 대기 화면 ===== */
        .stage-waiting {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            min-height: 400px;
        }

        .stage-waiting h2 {
            font-size: 32px;
            color: #333;
        }

        .stage-waiting p {
            font-size: 18px;
            color: #666;
        }

        .waiting-info {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #555;
            font-size: 16px;
            max-width: 400px;
        }

        .purpose-section {
            background: #fff3cd;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ffc107;
            max-width: 500px;
            margin: 20px 0;
            text-align: center;
        }

        .purpose-section h3 {
            color: #FF6B6B;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .purpose-section p {
            color: #333;
            font-size: 16px;
            line-height: 1.6;
        }

        .start-button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
        }

        /* ===== 공통 스타일 ===== */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .timer-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #ffc107;
            text-align: center;
        }

        .timer {
            font-size: 36px;
            font-weight: bold;
            color: #FF6B6B;
            font-family: 'Courier New', monospace;
        }

        .timer-label {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }

        /* ===== 1단계 스타일 ===== */
        .stage-1 {
            display: none;
        }

        .stage-1.active {
            display: block;
        }

        .cart-items {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-name {
            font-weight: 500;
            color: #333;
        }

        .item-price {
            color: #666;
            font-weight: 600;
        }

        .membership-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #ffc107;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #FF6B6B;
        }

        .membership-text {
            font-weight: 600;
            color: #333;
        }

        .membership-price {
            color: #FF6B6B;
            font-weight: bold;
            font-size: 16px;
        }

        .discount-note {
            font-size: 13px;
            color: #FF6B6B;
            margin-top: 8px;
            font-weight: 500;
        }

        .price-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #333;
        }

        .price-row.total {
            font-weight: bold;
            font-size: 18px;
            border-top: 2px solid #ddd;
            padding-top: 12px;
            margin-top: 12px;
        }

        .hidden-price {
            font-size: 11px;
            color: #999;
            margin-top: 5px;
            font-weight: 300;
        }

        /* ===== 2단계 스타일 ===== */
        .comparison-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .comparison-card {
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid #ddd;
        }

        .comparison-card.membership {
            background: linear-gradient(135deg, #FFE5E5 0%, #FFF0F0 100%);
            border: 3px solid #FF6B6B;
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.2);
        }

        .comparison-card.general {
            background: #f5f5f5;
            border: 3px solid #ccc;
        }

        .comparison-card.selected {
            border: 3px solid #4CAF50;
            background: linear-gradient(135deg, #E8F5E9 0%, #F1F8E9 100%);
        }

        .comparison-card:hover {
            transform: translateY(-5px);
        }

        .card-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .membership .card-title {
            color: #FF6B6B;
        }

        .badge {
            display: inline-block;
            background: #FF6B6B;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .price-detail {
            margin: 10px 0;
            font-size: 14px;
            color: #555;
        }

        .final-price {
            font-size: 24px;
            font-weight: bold;
            color: #FF6B6B;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid rgba(255, 107, 107, 0.3);
        }

        /* ===== 3단계 스타일 ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-message {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .emotional-message {
            background: #ffe0e0;
            padding: 15px;
            border-radius: 8px;
            color: #d32f2f;
            font-weight: 500;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #999;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            color: #777;
        }

        /* ===== 멤버십 가입 팝업 스타일 ===== */
        .membership-popup-headline {
            font-size: 22px;
            font-weight: bold;
            color: #FF6B6B;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .membership-benefits {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .benefit-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            font-size: 14px;
            color: #333;
            line-height: 1.5;
        }

        .benefit-item:last-child {
            margin-bottom: 0;
        }

        .benefit-icon {
            font-size: 18px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .benefit-text {
            flex: 1;
        }

        .benefit-title {
            font-weight: 600;
            color: #333;
        }

        .benefit-description {
            color: #666;
            font-size: 13px;
            margin-top: 3px;
        }

        .membership-hidden-terms {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
            font-size: 12px;
            color: #999;
            line-height: 1.6;
            border: 1px solid #ddd;
        }

        .membership-hidden-terms strong {
            color: #666;
        }

        /* ===== 완료 페이지 ===== */
        .completion-page {
            text-align: center;
        }

        .completion-message {
            padding: 40px 20px;
        }

        .completion-message h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #FF6B6B;
        }

        .result-box {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #e0e0e0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
            font-size: 16px;
            color: #333;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #555;
        }

        .result-value {
            font-weight: bold;
            color: #FF6B6B;
            font-size: 18px;
        }

        .reset-btn {
            background: #E8E8E8;
            color: #666;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
            margin-right: 10px;
        }

        .reset-btn:hover {
            background: #D8D8D8;
            color: #333;
        }

        .view-analysis-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .view-analysis-btn:hover {
            background: #45a049;
        }

        /* ===== 멤버십 가입 완료 페이지 ===== */
        .membership-completion-page {
            text-align: center;
            padding: 40px 20px;
        }

        .membership-completion-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .membership-completion-title {
            font-size: 28px;
            font-weight: bold;
            color: #FF6B6B;
            margin-bottom: 15px;
        }

        .membership-completion-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .membership-details-box {
            background: linear-gradient(135deg, #FFE5E5 0%, #FFF0F0 100%);
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            border: 2px solid #FF6B6B;
        }

        .membership-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 107, 107, 0.2);
            font-size: 16px;
            color: #333;
        }

        .membership-detail-item:last-child {
            border-bottom: none;
        }

        .membership-detail-label {
            font-weight: 600;
            color: #555;
        }

        .membership-detail-value {
            font-weight: bold;
            color: #FF6B6B;
            font-size: 18px;
        }

        .auto-renew-notice {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #ffc107;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }

        .membership-proceed-btn {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF5252 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .membership-proceed-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        /* ===== 분석 페이지 ===== */
        .analysis-page {
            padding: 20px 0;
        }

        .analysis-page h2 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        .dark-pattern-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 5px solid #FF6B6B;
        }

        .pattern-number {
            background: #FF6B6B;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 10px;
        }

        .pattern-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: inline-block;
        }

        .pattern-description {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .pattern-stage {
            background: #fff3cd;
            padding: 10px;
            border-radius: 6px;
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .button-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .button-row button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-to-completion-btn {
            background: #E8E8E8;
            color: #666;
        }

        .back-to-completion-btn:hover {
            background: #D8D8D8;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- 모달 오버레이 -->
    <div class="modal-overlay" id="modalOverlay"></div>

    <div class="container">
        <!-- ===== 시작 화면 ===== -->
        <div class="page waiting-page active">
            <div class="stage-waiting">
                <h2>🍕 배달 서비스</h2>
                <p>주문을 진행하시겠습니까?</p>
                
                <div class="purpose-section">
                    <h3>📌 이 테스트의 목적</h3>
                    <p><strong>일반 결제로 결제하기</strong>를 목표로 진행해주세요.</p>
                    <p style="margin-top: 10px; font-size: 14px; color: #666;">각 단계에서 얼마나 쉽게 멤버십으로 유도되는지 경험해봅시다.</p>
                </div>

                <div class="waiting-info">
                    <p>배달 결제 프로세스를 경험해봅시다.</p>
                    <p style="margin-top: 10px; font-size: 14px;">모든 단계를 완료하는
