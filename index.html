<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다크패턴 UI 경험 - 배달 결제 프로세스</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #87CEEB 0%, #87CEEB 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    max-width: 800px;
    width: 100%;
    padding: 40px;
}
.step-indicator {
    text-align: center;
    margin-bottom: 30px;
    color: #333;
}
.step-indicator h1 {
    font-size: 28px;
    margin-bottom: 10px;
}
.step-number {
    color: #666;
    font-weight: normal;
    font-size: 14px;
}
/* ===== 네비게이션 ===== */
.navigation {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 25px;
}
.nav-button {
    background: #E8E8E8;
    color: #666;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    flex: 1;
}
.nav-button:hover:not(:disabled) {
    background: #D8D8D8;
    color: #333;
}
.nav-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.nav-button.prev {
    flex: 0.5;
}
.nav-button.next {
    flex: 0.5;
}
/* ===== 시작 대기 화면 ===== */
.stage-waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    min-height: 400px;
}
.stage-waiting h2 {
    font-size: 32px;
    color: #333;
}
.stage-waiting p {
    font-size: 18px;
    color: #666;
}
.waiting-info {
    background: #f0f8ff;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    color: #555;
    font-size: 16px;
    max-width: 400px;
}
